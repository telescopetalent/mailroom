<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mailroom Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 20px;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    .field input:focus {
      outline: none;
      border-color: #111;
    }

    .field .hint {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .btn-save {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save:hover { background: #333; }

    .status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #1a7a1a;
    }
  </style>
</head>
<body>
  <h1>Mailroom Settings</h1>

  <div class="field">
    <label for="api-url">API URL</label>
    <input id="api-url" type="text" placeholder="http://localhost:8000">
    <div class="hint">Leave blank for localhost default</div>
  </div>

  <div class="field">
    <label for="api-key">API Key</label>
    <input id="api-key" type="password" placeholder="mr_...">
    <div class="hint">Your Mailroom API key (starts with mr_)</div>
  </div>

  <button id="save-btn" class="btn-save">Save</button>
  <div id="status" class="status" style="display: none;"></div>

  <script src="options.js"></script>
</body>
</html>
